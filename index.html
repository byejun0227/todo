<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="title">
        <svg class="title-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="4" fill="currentColor" opacity="0.12"/>
          <path d="M8 12l3 3 5-5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Todo
      </h1>
      <p class="date" id="date"></p>
    </header>

    <div class="input-row">
      <input
        id="new-todo"
        class="main-input"
        type="text"
        placeholder="새 할 일을 입력하세요..."
        autocomplete="off"
        maxlength="200"
      />
      <button id="add-btn" class="add-btn" aria-label="추가">
        <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18" aria-hidden="true">
          <path d="M10 4a1 1 0 011 1v4h4a1 1 0 110 2h-4v4a1 1 0 11-2 0v-4H5a1 1 0 110-2h4V5a1 1 0 011-1z"/>
        </svg>
        <span>추가</span>
      </button>
    </div>

    <div class="card">
      <div class="progress-wrap">
        <div class="progress" id="progress"></div>
      </div>

      <div class="filters">
        <button class="filter active" data-filter="all">전체</button>
        <button class="filter" data-filter="active">진행 중</button>
        <button class="filter" data-filter="completed">완료</button>
      </div>

      <ul id="list" class="list" role="list"></ul>

      <div class="footer">
        <span id="count" class="count"></span>
        <button id="clear" class="clear">완료 항목 삭제</button>
      </div>
    </div>

    <p class="hint">더블클릭으로 수정 &nbsp;·&nbsp; Enter로 저장 &nbsp;·&nbsp; Esc로 취소</p>
  </div>
  <script src="app.js"></script>
</body>
</html>
